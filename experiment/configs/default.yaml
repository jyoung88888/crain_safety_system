# ============================================================
# 실험 설정 (Experiment Configuration)
# 용도: train.py에서 로드하여 실험 파라미터 일괄 관리
# 복제: cp default.yaml exp_001_aug.yaml 로 실험별 분기
# ============================================================

experiment:
  name: "baseline_yolo11n"
  description: "YOLOv11n 기본 학습"
  tags:
    - baseline
    - yolo11n

# --- 모델 ---
model:
  architecture: "yolo11n.pt"        # yolo11n / yolo11s / yolo11m / yolo11l / yolo11x
  num_classes: 3                     # hoist, helmet, person
  class_names:
    - hoist
    - helmet
    - person

# --- 데이터 ---
data:
  dataset_yaml: "data/dataset.yaml"  # Ultralytics 포맷
  image_size: 640
  split_ratio:                        # train / val / test
    train: 0.8
    val: 0.15
    test: 0.05

# --- 학습 ---
train:
  epochs: 100
  batch_size: 16
  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.01                          # final lr = lr0 * lrf
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20                        # early stopping
  device: "0"                         # GPU id or "cpu"
  workers: 8
  seed: 42

# --- 증강 (Ultralytics 내장) ---
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0

# --- MLflow ---
mlflow:
  tracking_uri: "./mlflow_runs"
  experiment_name: "dongyang-object-detection"

# --- DVC ---
dvc:
  remote: "local"                     # local / s3 / gcs
  remote_path: "./dvc_storage"

# --- 추론 (서비스 연동용) ---
inference:
  conf_threshold: 0.5
  iou_threshold: 0.45
  max_det: 100
  half: true                          # FP16
